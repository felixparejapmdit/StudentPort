version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server/src/data:/app/src/data
      - ./server/src/uploads:/app/src/uploads
    environment:
      - NODE_ENV=production
      - PORT=5000

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000
