<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VID Quiz UI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .video-container { flex: 1; background: black; display: flex; justify-content: center; align-items: center; position: relative; }
        .placeholder-video { width: 80%; height: 70%; background: #333; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: #555; }
        .quiz-container { background: #16213e; padding: 30px; border-top-left-radius: 30px; border-top-right-radius: 30px; }
        .question { font-size: 1.2rem; margin-bottom: 20px; font-weight: 500; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 15px; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.3s; }
        .option-btn:hover { background: #0f3460; border-color: #e94560; }
        .progress-bar { width: 100%; height: 5px; background: #333; position: absolute; bottom: 0; }
        .progress { width: 40%; height: 100%; background: #e94560; }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="placeholder-video">Video Playing...</div>
        <div class="progress-bar"><div class="progress"></div></div>
    </div>
    <div class="quiz-container">
        <div class="question">Based on the video, what is the main purpose of the LMS system?</div>
        <div class="options">
            <button class="option-btn">A. To track letters</button>
            <button class="option-btn">B. To manage students</button>
            <button class="option-btn">C. To monitor servers</button>
            <button class="option-btn">D. To chat with friends</button>
        </div>
        <div style="margin-top: 20px; text-align: right;">
            <button style="background:#e94560; color:white; border:none; padding:10px 25px; border-radius:5px; cursor:pointer;">Next Question</button>
        </div>
    </div>
</body>
</html>
